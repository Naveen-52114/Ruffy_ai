services:
  chatbot:
    build:
      context: ./auffy ai
      dockerfile: Dockerfile
    container_name: ruffy-chatbot
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    restart: unless-stopped

  visual-assistant:
    build:
      context: ./VisualGpt-main
      dockerfile: Dockerfile
    container_name: ruffy-visual-assistant
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    env_file:
      - ./VisualGpt-main/.env
    restart: unless-stopped
